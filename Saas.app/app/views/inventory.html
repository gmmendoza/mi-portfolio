<!--
  ╔══════════════════════════════════════════════════════╗
  ║   VISTA: Gestión de Inventario                       ║
  ║   Archivo: views/inventory.html                      ║
  ║   Uso: cargado dinámicamente en #content-area        ║
  ╚══════════════════════════════════════════════════════╝
  El JS que lo controla está en js/inventory.js
-->

<section id="inventory" class="view-section">
    <!-- ── HEADER ──────────────────────────────────────── -->
    <div class="flex justify-between items-end mb-6">
        <div>
            <h2 class="text-2xl font-bold text-slate-800 dark:text-white">Gestión de Inventario</h2>
            <p class="text-slate-500 text-sm mt-1">Control de catálogo, stock y márgenes.</p>
        </div>
        <button class="px-5 py-2.5 bg-primary-600 hover:bg-primary-700 text-white rounded-lg font-medium shadow-md transition-colors flex items-center gap-2"
            onclick="openModal('newItemModal')">
            <i class="fas fa-plus"></i> Nuevo Artículo
        </button>
    </div>

    <!-- ── FILTROS ─────────────────────────────────────── -->
    <div class="flex flex-col h-[calc(100vh-200px)]">
        <div class="p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 mb-4 flex flex-wrap gap-4 items-center justify-between shadow-sm">
            <div class="flex gap-4 flex-1 max-w-lg">
                <div class="relative flex-1">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    <input type="text" id="invSearchInput" oninput="filterInventory()"
                        placeholder="Filtrar catálogo..."
                        class="w-full pl-9 pr-4 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg focus:outline-none focus:border-primary-500 focus:bg-white dark:focus:bg-slate-700 transition-colors dark:text-white">
                </div>
                <select id="invCategorySelect" onchange="filterInventory()"
                    class="px-3 py-2 text-sm bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-600 rounded-lg outline-none focus:border-primary-500 cursor-pointer transition-colors dark:text-white">
                    <option value="">Todas las Categorías</option>
                    <option value="Periféricos">Periféricos</option>
                    <option value="Componentes">Componentes</option>
                    <option value="Audio">Audio</option>
                    <option value="Video">Video</option>
                </select>
            </div>
        </div>

        <!-- ── GRID DE ARTÍCULOS ───────────────────────── -->
        <div class="flex-1 overflow-y-auto pr-2">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="invGrid">
                <!-- Tarjetas generadas dinámicamente por js/inventory.js -->
            </div>
        </div>
    </div>
</section>
